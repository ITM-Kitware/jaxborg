LR: 3.0e-4
NUM_ENVS: 1024
NUM_STEPS: 500
TOTAL_TIMESTEPS: 50000
UPDATE_EPOCHS: 4
NUM_MINIBATCHES: 16
GAMMA: 0.99
GAE_LAMBDA: 0.95
CLIP_EPS: 0.2
CLIP_VALUE_LOSS: false
ENT_COEF: 0.01
VF_COEF: 0.5
MAX_GRAD_NORM: 0.5
ACTOR_MAX_GRAD_NORM: 0.5
CRITIC_MAX_GRAD_NORM: 50.0
ACTIVATION: tanh
HIDDEN_DIM: 256
ANNEAL_LR: false
NETWORK_TYPE: "shared"         # "separate" (ActorCritic) or "shared" (SharedActorCritic)
BUSY_MASKING: false            # false = train on all steps including busy (matches CybORG CC4)
GRAD_CLIP_MODE: "global"       # "per_head" (separate actor/critic clip) or "global"
REWARD_SCALE: 1.0
NORM_REWARDS: true
SEED: 0
MLFLOW_ENABLED: true
CHECKPOINT_EVERY_UPDATES: 50
TOPOLOGY_MODE: generative
TRAINING_MODE: true
# Axis B (CEC env-diversity): per-key router-topology variation.
# false = default tree only (gen-base); true = sample from validated bank (gen-router).
VARY_ROUTER_LINKS: false
# Axis C (CEC env-diversity): per-key phase-reward variation.
# false = default phase rewards (legacy); true = sample from variant bank.
VARY_PHASE_REWARDS: false
# Phase 2 mission-objective family: per-key sampling of the CIA-component
# multipliers (availability-heavy, productivity-heavy, etc).
VARY_MISSION_PROFILE: false
# Phase 2 axis D: per-key allowed_subnet_pairs variation (eval-only by default).
VARY_SUBNET_PAIRS: false
# Phase 2 blue cooperation channel.  When true, the network's message head
# output is broadcast into state.messages each step so obs(t+1) carries
# msg(t).  When false, messages stay zero (silent baseline).
BLUE_COMMS: false
# gen-fixed control arm: integer seed → constant reset key for build_topology
# (single topology re-used every episode). null = normal per-key reset.
TOPOLOGY_FIXED_KEY: null
SAVE_DIR: null                 # null = auto-timestamp under $JAXBORG_EXP_DIR; else explicit path
