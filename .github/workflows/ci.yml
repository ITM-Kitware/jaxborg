name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  UV_FROZEN: "1"
  JAX_PLATFORMS: cpu

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra cpu
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test-fast:
    name: pytest (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra cpu
      - run: uv run pytest

  test-slow:
    name: pytest (slow) ${{ matrix.group }}/8
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra cpu
      # Per-shard duration partials live in .test_durations_cache/ as
      # group-N.json. Each shard restores the latest cache (any shard's
      # snapshot — most recent wins), merges all known partials into
      # .test_durations for pytest-split, runs its slice with
      # --store-durations, then snapshots its own partial back and saves.
      # Over successive runs partials from every shard accumulate.
      - uses: actions/cache@v4
        with:
          path: .test_durations_cache
          key: slow-durations-${{ github.run_id }}-${{ matrix.group }}
          restore-keys: |
            slow-durations-
      - name: Merge cached duration partials
        run: |
          python - <<'PY'
          import json, pathlib
          merged = {}
          cache = pathlib.Path('.test_durations_cache')
          if cache.is_dir():
              for f in sorted(cache.glob('group-*.json')):
                  try:
                      merged.update(json.loads(f.read_text()))
                  except Exception:
                      pass
          if merged:
              pathlib.Path('.test_durations').write_text(json.dumps(merged, indent=2))
          PY
      # `-o addopts=` overrides pyproject's `-n auto`: sharding is the
      # parallelism axis here, and stacking xdist on top contends on the JAX
      # persistent-cache lock (cold cache + many tiny compiles).
      - run: uv run pytest -o "addopts=" -m slow --splits 8 --group ${{ matrix.group }} --store-durations
      - name: Snapshot this shard's partial durations
        if: always()
        run: |
          mkdir -p .test_durations_cache
          [ -f .test_durations ] && cp .test_durations .test_durations_cache/group-${{ matrix.group }}.json || true
