meta:
  name: cyborg_matched
  source: "in-repo cyborg_matched experiment, captured 2026-04-25"
  added: 2026-04-30
  notes: |
    Pre-Singh experiment that matched JAX-trained vs CybORG-trained
    policies under a common gamma=0.85 / lr=3e-4 / shared-trunk setup.
    Encoded as a recipe to keep the matched-training v2 reproducibility
    intact after the recipe refactor superseded the old Hydra overrides.

algorithm: ippo

core:
  lr: 3.0e-4
  gamma: 0.85
  gae_lambda: 0.95
  clip_eps: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
  ent_coef: 0.01
  norm_rewards: true

arch:
  name: shared
  hidden_dim: 256
  hidden_layers: 2
  activation: tanh

train:
  episode_length: 500
  buffer_size: 2560000        # 1024 envs * 500 * 5 agents flat
  minibatch_size: 160000
  sgd_iterations: 64
  total_timesteps: 20000000

jax:
  num_envs: 1024
  num_minibatches: 16
  update_epochs: 4
  topology_mode: cyborg_bank
  topology_bank_size: 32
  checkpoint_every_updates: 10

cleanrl:
  num_envs: 48
  rollout_length: 500
  num_minibatches: 16
  num_epochs: 4
