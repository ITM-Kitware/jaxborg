meta:
  name: cec_phase6_miss_10M
  source: "Phase 6 plan — cocktail ablation (mission-bank-only axis)"
  added: 2026-05-11
  notes: |
    Single-axis ablation: MISSION bank (anti-correlated 4-entry) active,
    other banks OFF. Tests whether mission variation alone drives ZSC.

algorithm: ippo

core:
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
  ent_coef: 0.01
  norm_rewards: true

arch:
  name: shared
  hidden_dim: 256
  hidden_layers: 2
  activation: tanh

train:
  episode_length: 500
  buffer_size: 5120000
  minibatch_size: 320000
  sgd_iterations: 64
  total_timesteps: 10000000
  variant: cc4_stock
  mission_bank:
    - [1, 1, 1]
    - [3, 3, 1]
    - [1, 3, 3]
    - [3, 1, 3]
  mission_bank_amplify: 1.0

eval:
  variant: cc4_stock

jax:
  num_envs: 48
  num_minibatches: 16
  update_epochs: 4
  checkpoint_every_updates: 50

cleanrl:
  num_envs: 48
  rollout_length: 500
  num_rollouts_per_update: 1
  num_minibatches: 16
