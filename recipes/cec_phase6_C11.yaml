meta:
  name: cec_phase6_C11
  source: "Phase 6 plan — plans/jax/cc4/cec/cec-phase6-plan.md (Test 2 / 2×2 factorial)"
  added: 2026-05-09
  notes: |
    Phase 6 ZSC training matrix — arm C11 (both axes: shape bank + mission bank).
    Forks Matched-Training v2 hyperparameters from recipes/default.yaml.

    Per-reset draws an independent topology snapshot (16-shape bank) and an
    independent mission triple (4-entry default bank). mission_bank_amplify=1.0
    per the plan's pre-registered default. CEC-faithful: training partner
    fixed (cc4_stock variant's red = fsm); held-out red sweep at eval time
    via eval_recipe.py --eval-red.

algorithm: ippo

core:
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
  ent_coef: 0.01
  norm_rewards: true

arch:
  name: shared
  hidden_dim: 256
  hidden_layers: 2
  activation: tanh

train:
  episode_length: 500
  buffer_size: 5120000
  minibatch_size: 320000
  sgd_iterations: 64
  total_timesteps: 3000000
  variant: cc4_stock
  topology_bank:
    - scripts/dev/topology_bank/shape_00.snapshot.npz
    - scripts/dev/topology_bank/shape_01.snapshot.npz
    - scripts/dev/topology_bank/shape_02.snapshot.npz
    - scripts/dev/topology_bank/shape_03.snapshot.npz
    - scripts/dev/topology_bank/shape_04.snapshot.npz
    - scripts/dev/topology_bank/shape_05.snapshot.npz
    - scripts/dev/topology_bank/shape_06.snapshot.npz
    - scripts/dev/topology_bank/shape_07.snapshot.npz
    - scripts/dev/topology_bank/shape_08.snapshot.npz
    - scripts/dev/topology_bank/shape_09.snapshot.npz
    - scripts/dev/topology_bank/shape_10.snapshot.npz
    - scripts/dev/topology_bank/shape_11.snapshot.npz
    - scripts/dev/topology_bank/shape_12.snapshot.npz
    - scripts/dev/topology_bank/shape_13.snapshot.npz
    - scripts/dev/topology_bank/shape_14.snapshot.npz
    - scripts/dev/topology_bank/shape_15.snapshot.npz
  # Anti-correlated bank — see cec_phase6_C01.yaml for rationale.
  mission_bank:
    - [1, 1, 1]
    - [3, 3, 1]
    - [1, 3, 3]
    - [3, 1, 3]
  mission_bank_amplify: 1.0

eval:
  variant: cc4_stock

jax:
  num_envs: 48
  num_minibatches: 16
  update_epochs: 4
  checkpoint_every_updates: 50

cleanrl:
  num_envs: 48
  rollout_length: 500
  num_rollouts_per_update: 1
  num_minibatches: 16
